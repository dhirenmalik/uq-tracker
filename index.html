<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>UQ Semester Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- ONBOARDING OVERLAY -->
  <div id="onboardingScreen">
    <div class="onboarding-card">
      <h1 class="onboarding-title">Welcome to UQ Tracker</h1>
      <p class="onboarding-subtitle">Select your program to load your dynamic degree planner.</p>
      
      <div class="onboarding-fields">
        <div class="onboarding-field">
          <label>PROGRAM</label>
          <select id="selProgram" class="meta-select"></select>
        </div>
        <div class="onboarding-field">
          <label>MAJOR</label>
          <select id="selMajor" class="meta-select"></select>
        </div>
        <div class="onboarding-field">
          <label>MINOR</label>
          <select id="selMinor" class="meta-select"></select>
        </div>
        <div class="onboarding-field">
          <label>START YEAR</label>
          <select id="selYear" class="meta-select"></select>
        </div>
      </div>
      
      
      <button id="startPlanningBtn" class="primary-btn">Start Planning</button>
      
      <!-- Loading UI for live scraper -->
      <div id="scraperLoadingUI" class="is-hidden" style="display:none; flex-direction:column; gap:8px; margin-top:16px;">
        <span id="scraperStatus" class="onboarding-subtitle" style="margin:0; font-size:12px;">Fetching from UQ API...</span>
        <div class="progress-bar-container">
          <div class="progress-bar" id="scraperProgressBar" style="width: 0%; background: var(--accent-color);"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="appContainer" class="page-container">

    <header class="site-header">
      <h1 class="hero-title">UQ Tracker</h1>

      <!-- Hidden original select for JS compatibility -->
      <select id="degreeSelect" class="strict-select" style="display:none;"></select>

      <div class="degree-meta">
        <div class="degree-field">
          <span class="degree-field-label">PROGRAM PATH</span>
          <span class="degree-field-value" id="dispDegreeTitle">Loading...</span>
          <span class="degree-field-label" id="dispDegreeYear" style="margin-top:2px;"></span>
        </div>
      </div>

      <div class="actions-rows" style="margin-top: 12px;">
        <div class="actions-group">
          <button id="resetBtn" class="strict-btn" type="button">Reset</button>
          <button id="undoBtn" class="strict-btn" type="button" disabled>Undo</button>
          <button id="redoBtn" class="strict-btn" type="button" disabled>Redo</button>
        </div>
        <div class="actions-group">
          <button id="shareBtn" class="strict-btn" type="button">Share</button>
          <button id="exportBtn" class="strict-btn" type="button">Export</button>
          <button id="changeDegreeBtn" class="strict-btn" type="button">Change</button>
        </div>
      </div>

      <nav class="tab-list" id="navTabs" style="margin-top: 8px;">
        <button id="tabBtnPlan" class="tab-item active" type="button">Plan</button>
        <button id="tabBtnCourses" class="tab-item" type="button">Courses</button>
      </nav>
    </header>

    <!-- Left Column: Always visible sidebar -->
    <aside class="col-left">

      <div class="sidebar-section">
        <h2 class="section-label">PROGRESS</h2>
        <div class="section-divider"></div>
        <div class="progress-list" id="progressDashboard">
          <!-- Progress injected here -->
        </div>
      </div>

      <div class="sidebar-section">
        <h2 class="section-label">QUICK ADD</h2>
        <div class="section-divider"></div>
        <div class="search-box">
          <input type="text" id="quickAddSearch" class="strict-input" placeholder="Search by course code or name..."
            autocomplete="off" />
          <div id="quickAddDropdown" class="quick-add-dropdown is-hidden"></div>
        </div>
      </div>

      <div class="sidebar-section sidebar-section--grow">
        <h2 class="section-label">SHORTLIST</h2>
        <div class="section-divider"></div>
        <div class="shortlist-container" id="shortlistContainer">
          <!-- Shortlisted items injected here -->
        </div>

        <!-- Fallback element for drag compatibility, hidden -->
        <div id="unassignedList" data-semester="unassigned" class="is-hidden"></div>
      </div>

    </aside>

    <!-- Right Column: Switchable content -->
    <main class="col-right">

      <!-- PLAN PANEL -->
      <div id="planContent" class="right-panel">
        <div id="loadingBar" class="loading-state">
          <span id="loadingBarText">Loading API Semesters...</span>
          <div id="loadingBarFill" style="display:none;"></div>
        </div>

        <div class="semesters-grid" id="semestersGrid">
          <!-- Semesters injected here -->
        </div>
      </div>

      <!-- COURSES PANEL -->
      <div id="coursesContent" class="right-panel is-hidden">

        <div class="courses-header-bar">
          <h2 class="section-label">Course Browser</h2>
          <div class="section-divider"></div>

          <div class="search-box" style="max-width: 600px;">
            <input type="text" id="courseSearch" class="strict-input" placeholder="Search a course..." />
            <span class="search-icon">↘</span>
          </div>

          <div class="filters-container" id="catFilters">
            <!-- Filters injected here -->
          </div>

          <button id="addElectiveToggleBtn" class="strict-link" type="button">＋ Add Custom Elective</button>

          <form id="addElectiveForm" class="strict-form is-hidden" style="max-width: 600px;">
            <label for="customCourseCode">Code</label>
            <input id="customCourseCode" name="customCourseCode" type="text" placeholder="e.g. COMP3301" required />

            <label for="customCourseName">Name</label>
            <input id="customCourseName" name="customCourseName" type="text" placeholder="Course Name" required />

            <label for="customCourseUnits">Units</label>
            <select id="customCourseUnits" name="customCourseUnits">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
            </select>

            <div class="form-actions">
              <button type="submit" class="strict-btn">Add</button>
              <button type="button" id="cancelElectiveBtn" class="strict-btn">Cancel</button>
            </div>
          </form>
        </div>

        <div class="courses-grid" id="coursesGrid">
          <!-- Full page courses injected here -->
        </div>

      </div>

    </main>

  </div>

  <!-- Shared Semester Picker Popup -->
  <div id="semesterPickerPopup" class="semester-picker-popup is-hidden">
    <div class="picker-header">Add to semester</div>
    <div class="picker-options" id="semesterPickerOptions"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="data.js"></script>
  <script src="scraper.js"></script>
  <script src="app.js"></script>
</body>

</html>
