<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UQ Semester Tracker | Software Engineering + AI Minor</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&family=Zilla+Slab:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="header-main">
        <h1>UQ Semester Tracker</h1>
        <select id="degreeSelect" class="degree-select">
          <option value="se_ai">Software Engineering (AI Minor) — BE(Hons) 2024 to 2027</option>
        </select>
        <div class="header-actions">
          <button id="resetBtn" class="premium-btn" type="button">Reset Plan</button>
          <button id="undoBtn" class="premium-btn" type="button" disabled>Undo</button>
          <button id="redoBtn" class="premium-btn" type="button" disabled>Redo</button>
          <button id="shareBtn" class="premium-btn" type="button">Share Plan</button>
          <button id="exportBtn" class="premium-btn header-btn" type="button">Export</button>
          <button id="themeToggleBtn" class="premium-btn" type="button">DARK</button>
        </div>
      </div>
      <div class="progress-dashboard" id="progressDashboard">
        <!-- Progress widgets dynamically injected here -->
      </div>
    </header>

    <div id="loadingBar" class="loading-bar">
      <div class="loading-bar-fill" id="loadingBarFill"></div>
      <span class="loading-bar-text" id="loadingBarText">LOADING SEMESTERS...</span>
    </div>

    <div class="main-content">
      <!-- Course Catalog -->
      <aside class="catalog-panel">
        <div class="catalog-header">
          <h2>Course Catalog</h2>
          <div class="search-box">
            <input type="text" id="courseSearch" placeholder="Search a course..." />
          </div>
          <div class="cat-filters" id="catFilters">
          </div>
          <button id="addElectiveToggleBtn" class="add-elective-toggle" type="button">ADD ELECTIVE</button>
          <form id="addElectiveForm" class="add-elective-form is-hidden">
            <label for="customCourseCode">CODE</label>
            <input id="customCourseCode" name="customCourseCode" type="text" placeholder="e.g. PSYC1030" required />

            <label for="customCourseName">NAME</label>
            <input id="customCourseName" name="customCourseName" type="text" placeholder="Course Name" required />

            <label for="customCourseUnits">UNITS</label>
            <select id="customCourseUnits" name="customCourseUnits">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
            </select>

            <div class="add-elective-actions">
              <button type="submit" class="add-elective-btn">ADD</button>
              <button type="button" id="cancelElectiveBtn" class="add-elective-btn">CANCEL</button>
            </div>
          </form>
        </div>
        <div class="course-list-container">
            <div class="course-list" id="unassignedList" data-semester="unassigned">
            <!-- Draggable courses injected here -->
            </div>
        </div>
      </aside>

      <!-- Semesters Grid -->
      <main class="semesters-grid" id="semestersGrid">
        <!-- 8 Semesters initialized dynamically by JS -->
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
