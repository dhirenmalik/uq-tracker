name: Scrape UQ Data

on:
  schedule:
    # Run weekly on Monday at 6am AEST (Sun 8pm UTC)
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data.js && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore: auto-update course data from UQ"
          git push
